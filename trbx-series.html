<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YAMAHA - TRBX系列</title>
    <style>
        body {
            text-align: center;
            font-family: 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
            background: #fff;
        }

        .page-title {
            margin-top: 40px;
            font-size: 48px;
            font-weight: bold;
        }

        .slideshow-container {
            max-width: 800px;
            position: relative;
            margin: 30px auto;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        .mySlides {
            display: none;
        }

        .mySlides img {
            width: 100%;
            vertical-align: middle;
            display: block;
        }

        .fade {
            animation: fade 1.5s;
        }

        @keyframes fade {
            from {
                opacity: 0.4;
            }

            to {
                opacity: 1;
            }
        }

        .prev,
        .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            padding: 14px 16px;
            color: #fff;
            font-weight: bold;
            font-size: 24px;
            transition: 0.3s;
            user-select: none;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            line-height: 1;
        }

        .prev {
            left: 12px;
        }

        .next {
            right: 12px;
        }

        .prev:hover,
        .next:hover {
            background-color: rgba(0, 0, 0, 0.7);
        }

        .dot-container {
            text-align: center;
            position: absolute;
            bottom: 14px;
            width: 100%;
        }

        .dot {
            cursor: pointer;
            height: 12px;
            width: 12px;
            margin: 0 4px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.3s;
        }

        .dot.active,
        .dot:hover {
            background-color: #717171;
        }

        .button-row-container {
            display: flex;
            justify-content: center;
            margin: 10px auto 0;
            max-width: 90%;
        }

        .product-button {
            display: inline-block;
            padding: 12px 28px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #555;
            border-radius: 5px;
            background-color: #333;
            color: white;
            text-decoration: none;
            min-width: 220px;
        }

        .product-button:hover {
            background-color: #444;
        }

        .back-button {
            display: inline-block;
            background-color: #f0f0f0;
            color: #333;
            padding: 8px 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            text-decoration: none;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .back-button:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>

<body>
    <h1 class="page-title">TRBX系列 Electric Bass</h1>

    <div class="slideshow-container">
        <div class="mySlides fade">
            <img src="https://www.yamaha.com.cn/images/bb_series_img/overview_bbp_638x366_a7b93d203e782459b72b65845be5ab8a.jpg"
                alt="TRBX Slide 1">
        </div>
        <div class="mySlides fade">
            <img src="https://www.yamaha.com.cn/images/bb_series_img/overview_700_638x366_d4b3ab2bb377f888a4f98e673f7cb940.jpg"
                alt="TRBX Slide 2">
        </div>
        <div class="mySlides fade">
            <img src="https://www.yamaha.com.cn/images/bb_series_img/overview_400_638x366_966f50444c8f7e300297af68569d22a4.jpg"
                alt="TRBX Slide 3">
        </div>
        <div class="mySlides fade">
            <img src="https://www.yamaha.com.cn/images/bb_series_img/overview_200_638x366_3609549f2ceffdd86cde6486583fb225.jpg"
                alt="TRBX Slide 4">
        </div>

        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>

        <div class="dot-container">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
            <span class="dot" onclick="currentSlide(4)"></span>
        </div>
    </div>

    <div class="button-row-container">
        <a href="https://www.yamaha.com.cn/products/musical-instruments/guitars/electricgbass/trbx-series"
            target="_blank" class="product-button">
            进入TRBX系列官网
        </a>
    </div>

    <a href="index.html" class="back-button">返回主页</a>

    <script>
        let slideIndex = 1;
        let slideInterval;

        document.addEventListener("DOMContentLoaded", function () {
            showSlides(slideIndex);
            startSlideShow();
        });

        document.querySelector(".slideshow-container").addEventListener("mouseenter", stopSlideShow);
        document.querySelector(".slideshow-container").addEventListener("mouseleave", startSlideShow);

        function startSlideShow() {
            stopSlideShow();
            slideInterval = setInterval(() => {
                plusSlides(1);
            }, 5000);
        }

        function stopSlideShow() {
            clearInterval(slideInterval);
        }

        function plusSlides(n) {
            showSlides((slideIndex += n));
        }

        function currentSlide(n) {
            showSlides((slideIndex = n));
        }

        function showSlides(n) {
            const slides = document.getElementsByClassName("mySlides");
            const dots = document.getElementsByClassName("dot");

            if (n > slides.length) slideIndex = 1;
            if (n < 1) slideIndex = slides.length;

            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }

            for (let i = 0; i < dots.length; i++) {
                dots[i].className = dots[i].className.replace(" active", "");
            }

            slides[slideIndex - 1].style.display = "block";
            dots[slideIndex - 1].className += " active";
        }
    </script>
</body>

</html>
