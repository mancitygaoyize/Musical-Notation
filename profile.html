<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人主页</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:url("all.jpg");
            background-size:cover;
            background-position:center;
            background-attachment:fixed;
            font-family:system-ui;
        }
        .profile-box{
            width:500px;
            margin:80px auto;
            background:rgba(255,255,255,0.9);
            border-radius:25px;
            padding:40px;
            box-shadow:0 10px 40px rgba(0,0,0,0.2);
            backdrop-filter:blur(10px);
        }
        .avatar-up{
            text-align:center;
            margin-bottom:20px;
        }
        .avatar-img{
            width:100px;
            height:100px;
            border-radius:50%;
            background:#ddd;
            margin:0 auto 10px;
        }
        input, textarea{
            width:100%;
            padding:12px;
            margin:8px 0;
            border:1px solid #ddd;
            border-radius:12px;
            font-size:15px;
        }
        button{
            width:100%;
            padding:14px;
            background:#007bff;
            color:#fff;
            border:none;
            border-radius:14px;
            margin-top:15px;
            font-size:16px;
            cursor:pointer;
        }
        h2{
            text-align:center;
            margin-bottom:25px;
            color:#222;
        }
        .back-home{
            text-align:center;
            margin-top:20px;
        }
        .back-home a{
            color:#007bff;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="profile-box">
    <h2>个人资料设置</h2>
    <div class="avatar-up">
        <div class="avatar-img"></div>
        <input type="file" accept="image/*">
    </div>

    <input type="text" placeholder="用户名" value="测试用户">
    <input type="date" placeholder="生日">
    <textarea rows="3" placeholder="简介"></textarea>
    <input type="password" placeholder="修改密码">

    <button onclick="alert('保存成功！')">保存修改</button>

    <div class="back-home">
        <a href="index.html">← 返回首页</a>
    </div>
</div>

</body>
</html>
