<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:url("all.jpg");
            background-size:cover;
            background-position:center;
            background-attachment:fixed;
        }
        .login-box{
            width:400px;
            margin:100px auto;
            background:rgba(255,255,255,0.95);
            border-radius:20px;
            padding:30px;
        }
        input{
            width:100%;
            height:45px;
            margin:10px 0;
            padding:0 10px;
            border-radius:8px;
            border:1px solid #ddd;
        }
        button{
            width:100%;
            height:45px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:8px;
            margin-top:10px;
        }
        h2{
            text-align:center;margin-bottom:20px;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>用户登录</h2>
    <form action="check_login.php" method="post">
        <input name="username" placeholder="用户名" required>
        <input name="password" placeholder="密码" type="password" required>
        <button type="submit">登录</button>
    </form>
</div>
</body>
</html>
